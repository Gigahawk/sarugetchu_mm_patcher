name: Build VM Patcher Image
on:
  - pull_request
  - push

jobs:
  build-vm:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Install qemu-utils
        run: |
          sudo apt-get update
          sudo apt-get install qemu-utils

      - uses: actions/checkout@v4

      - name: Download alpine-make-vm-image
        run: | 
          wget https://raw.githubusercontent.com/alpinelinux/alpine-make-vm-image/v0.13.2/alpine-make-vm-image \
            && echo '2720b23e4c65aff41a3ab781a26467b66985c526  alpine-make-vm-image' | sha1sum -c \
            || exit 1
          chmod +x alpine-make-vm-image

      - name: Build patcher image
        run: |
          sudo ./alpine-make-vm-image \
              --image-format qcow2 \
              --image-size 32G \
              --packages "$(cat vm_conf/packages)" \
              --script-chroot \
              ssmm_build_vm.qcow2 -- ./vm_conf/configure.sh

      - name: Archive objects
        # Skip archive if running on act
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ssmm_build_vm
          path: ssmm_build_vm.qcow2